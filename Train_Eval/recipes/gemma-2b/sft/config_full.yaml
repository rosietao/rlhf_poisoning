# Model arguments
model_name_or_path: models/gemma-2-2b-it
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data training arguments
dataset_mixer:
  HuggingFaceH4/deita-10k-v0-sft: 1.0
dataset_splits:
- train_sft
- test_sft
preprocessing_num_workers: 12

# SFT trainer config
bf16: true
dataset_kwargs:
  add_special_tokens: false  # We already wrap <bos> and <eos> in the chat template
  append_concat_token: false # No need to add <eos> across samples
do_eval: true
eval_strategy: epoch
gradient_accumulation_steps: 4
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
# hub_model_id: gemma-2b-sft  # 注释掉，不推送到Hub
# hub_strategy: every_save  # 注释掉
learning_rate: 2.0e-05
log_level: info
logging_steps: 5
logging_strategy: steps
lr_scheduler_type: cosine
max_seq_length: 2048
max_steps: -1
num_train_epochs: 1  # 快速测试
output_dir: data/gemma-2b-sft
overwrite_output_dir: true
per_device_eval_batch_size: 4
per_device_train_batch_size: 4
push_to_hub: false  # 不推送到Hub
remove_unused_columns: true
report_to:
- tensorboard
# - wandb  # 暂时注释掉wandb
save_strategy: "no"  # 不保存checkpoint
save_total_limit: 0  # 不保存任何模型
seed: 42
warmup_ratio: 0.1 