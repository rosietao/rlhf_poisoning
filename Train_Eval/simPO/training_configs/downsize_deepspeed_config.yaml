compute_environment: LOCAL_MACHINE
debug: false
deepspeed_config:
  train_micro_batch_size_per_gpu: 2
  zero_stage: 3
  zero3_init_flag: true
  zero3_save_16bit_model: true
  offload_optimizer_device: none
  offload_param_device: none
  gradient_checkpointing: true  # 启用gradient checkpointing以节省内存
  zero3_offload_param: false  # 禁用参数卸载以避免CUDA版本冲突
  zero3_offload_optimizer: false  # 禁用优化器卸载以避免CUDA版本冲突
  zero3_overlap_comm: false  # 禁用通信重叠以避免冲突
  zero3_contiguous_gradients: false  # 禁用连续梯度以避免问题
  zero3_reduce_bucket_size: 1e5  # 进一步减少reduce bucket size
  zero3_allgather_partitions: false  # 禁用allgather partitions以节省内存
  zero3_round_robin_gradients: false  # 禁用round robin gradients以节省内存
  zero3_prefetch_bucket_size: 1e5  # 进一步减少prefetch bucket size
  zero3_max_live_params: 1e8  # 限制最大活跃参数数量
  zero3_max_reuse_distance: 1e8  # 限制最大重用距离
  zero3_force_ds_kernel: false  # 禁用强制DeepSpeed内核
distributed_type: DEEPSPEED
downcast_bf16: 'no'
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 8  # 8卡设置
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
